org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Pin the JVM Gradle itself runs on. Without this, IDE Gradle sync can pick up
# whichever JDK happens to resolve first outside the shell's PATH ordering
# (e.g. a newer Homebrew JDK Gradle doesn't support), causing sync failures.
# See docs/getting-started.md#troubleshooting.
org.gradle.java.home=/Applications/Android Studio.app/Contents/jbr/Contents/Home
